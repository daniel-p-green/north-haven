name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  db-validation:
    name: Migration Smoke and Schema Diff
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: north_haven_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d north_haven_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Make DB scripts executable
        run: chmod +x scripts/db/*.sh

      - name: Migration smoke tests
        env:
          DB_TOOL_MODE: local
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: north_haven_ci
        run: bash scripts/db/migration_smoke_test.sh

      - name: Schema diff check
        env:
          DB_TOOL_MODE: local
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: north_haven_ci
        run: bash scripts/db/check_schema_diff.sh
