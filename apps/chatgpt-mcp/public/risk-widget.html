<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>North Haven Risk Summary</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ef;
        --card: #ffffff;
        --ink: #2f281d;
        --muted: #6b5f4f;
        --line: #e6ddcf;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.45 "Avenir Next", "Segoe UI", sans-serif;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <strong>Risk Widget</strong>
        <p class="muted">North Haven companion surface placeholder for risk explanation UI.</p>
      </div>
    </main>
  </body>
</html>
